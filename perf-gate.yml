# Performance Gate configuration.
# Everything here runs on your own machine / runner. No data leaves the network.

llm:
  enabled: true
  backend: ollama            # ollama | openai  (openai = vLLM or Azure OpenAI private endpoint)
  model: qwen2.5-coder:7b    # a code-specialised local model; swap for 14b/32b for stronger reasoning
  base_url: ""               # blank = backend default (http://localhost:11434 for ollama)
  timeout: 60
  max_findings: 40           # cap LLM calls per push so reviews stay fast

knowledge_base:
  index_path: .perf-gate/kb-index.json   # optional local PDF index; git-ignored, built with `perf-gate build-kb`

gate:
  fail_on: HIGH              # fail the push/build if any finding is at or above this severity
                             # CRITICAL | HIGH | MEDIUM | LOW | INFO | NONE (NONE = report only, never fail)
  ignore_rules: []           # e.g. ["fe.inline_function"]
  ignore_paths:              # substrings; changes under these paths are skipped
    - test/
    - tests/
    - generated/

history:
  # Track findings + fix-rate over time. Default backend is SQLite (a local file).
  # For Postgres, set the env var PERF_GATE_DB_URL (operator-only; never read from
  # this repo file). Then run `perf-gate review --all --record` and
  # `perf-gate trends` to see the trend. Nothing here touches the network.
  enabled: false
  store_code: true           # store the offending line locally (stays on-box). false = fingerprints only

jira:
  # Auto-create tickets in your ON-PREM Jira (Data Center / Server) for
  # high-severity findings. PLACEHOLDERS below are the only repo-side settings;
  # the Jira base URL + API token are operator-only and set as ENV VARS so a
  # scanned repo can never redirect findings off your network:
  #   export PERF_GATE_JIRA_URL="https://jira.your-company.local"
  #   export PERF_GATE_JIRA_TOKEN="<Jira Data Center Personal Access Token>"
  # With no URL/token set it runs in dry-run and just prints the tickets it would file.
  enabled: false
  project_key: "YOUR-PROJECT-KEY"   # <-- placeholder: your Jira project key, e.g. PERF
  issue_type: Bug                   # Jira issue type to create
  min_severity: CRITICAL            # file tickets at/above this severity
  labels:
    - performance-gate
  include_code: true                # include the offending line in the ticket body (goes only to your Jira)
  auth: bearer                      # bearer = Data Center Personal Access Token | basic (needs PERF_GATE_JIRA_USER)
